name: xiraNET CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release

      - name: Run unit + integration tests
        run: cargo test --test integration_tests

      - name: Clippy lint (fail on warnings)
        run: cargo clippy -- -D warnings

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t xiranet:latest .

      - name: Verify Docker image starts
        run: |
          docker run -d --name xira-test -p 9000:9000 xiranet:latest
          echo "Waiting for server startup..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:9000/health; then
              echo ""
              echo "✅ Health check passed!"
              break
            fi
            sleep 1
          done
          # Final assert — must return 200
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:9000/health)
          echo "Health endpoint returned: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Health check failed!"
            docker logs xira-test
            docker stop xira-test && docker rm xira-test
            exit 1
          fi
          docker stop xira-test && docker rm xira-test
