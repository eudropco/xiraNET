name: xiraNET CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Tüm test/integration koşulları için at-rest secrets kasası
  XIRA_SECRETS_KEY: "ci-only-32byte-test-key-not-secret-aaaa"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (workspace, all-targets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-clippy-
      - run: cargo clippy --workspace --all-targets -- -D warnings

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit || true
      # Bilinen advisory'ler için no-fail-fast; gerekirse `--deny warnings` ile sertleştir.
      - run: cargo audit

  test:
    name: Build & Test (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-test-
      - name: Build (workspace)
        run: cargo build --workspace --release
      - name: Test (workspace, all targets)
        run: cargo test --workspace --all-targets

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, clippy, fmt]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t xiranet:latest .

      - name: Verify Docker image starts (with secrets key)
        run: |
          docker run -d \
            --name xira-test \
            -p 9000:9000 \
            -e XIRA_SECRETS_KEY="ci-only-32byte-test-key-not-secret-aaaa" \
            xiranet:latest
          echo "Waiting for server startup..."
          sleep 10
          echo "=== Container logs ==="
          docker logs xira-test
          echo "=== End logs ==="
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:9000/health || echo "000")
          echo "Health endpoint returned: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Health check failed (HTTP $HTTP_CODE)"
            docker stop xira-test && docker rm xira-test
            exit 1
          fi
          echo "✅ Health check passed!"
          docker stop xira-test && docker rm xira-test
