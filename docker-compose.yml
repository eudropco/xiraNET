services:
  xiranet:
    build: .
    container_name: xiranet-gateway
    ports:
      - "9000:9000"   # HTTP Gateway
      - "9001:9001"   # gRPC (optional)
    volumes:
      - ./xiranet.toml:/app/xiranet.toml:ro
      - xiranet-data:/app/data
      - xiranet-logs:/app/logs
      - ./certs:/app/certs:ro
      - ./plugins:/app/plugins:ro
    environment:
      - RUST_LOG=info
      # MFA seed'leri ve OAuth2 secret'larını şifrelemek için zorunlu (>= 32 bytes).
      # Production: docker secret veya yönetilen secret store kullan.
      - XIRA_SECRETS_KEY=${XIRA_SECRETS_KEY:-}
    restart: unless-stopped
    # Public /health endpoint'i kullanılır — admin API key gerektirmez.
    # Eski compose dosyası hardcoded X-Api-Key kullanıyordu; o credential repo'da
    # leak oluyordu, kaldırıldı.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - xiranet
    # Tek pid içinde çalış, capability'leri minimize et (gateway sadece port bind ediyor).
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # Prometheus (optional) — pinned version
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: xiranet-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - xiranet
    networks:
      - xiranet
    profiles:
      - monitoring

  # Grafana (optional) — pinned version
  grafana:
    image: grafana/grafana:11.4.0
    container_name: xiranet-grafana
    ports:
      - "3000:3000"
    environment:
      # Admin parolası ENV ile verilmeli; default 'admin' deploy'a sızmasın.
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD required}
    depends_on:
      - prometheus
    networks:
      - xiranet
    profiles:
      - monitoring

volumes:
  xiranet-data:
  xiranet-logs:

networks:
  xiranet:
    driver: bridge
